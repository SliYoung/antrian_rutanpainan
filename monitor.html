<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Monitor Antrian TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:#0b3c5d;
  color:#fff;
  overflow:hidden;
}

.wrapper{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:8vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  background:#0a2c44;
  font-size:1.2vw;
}

.time{font-weight:700}

/* MAIN */
.main{
  flex:1;
  display:flex;
}

/* KIRI */
.left{
  width:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.loket{
  font-size:3vw;
  font-weight:800;
}

.nomor-box{
  margin-top:2vh;
  background:#fff;
  color:#0b3c5d;
  padding:3vh 5vw;
  border-radius:2vw;
  font-size:8vw;
  font-weight:800;
  animation:pulse 1.5s infinite;
}

/* KANAN VIDEO */
.right{
  width:50%;
  padding:1vw;
}

.video{
  width:100%;
  height:100%;
  background:#000;
  border-radius:1vw;
  overflow:hidden;
}

.video video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* BOTTOM */
.bottom{
  height:12vh;
  display:flex;
  background:#0a2c44;
}

.loket-item{
  flex:1;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:1.2vw;
  border-right:1px solid rgba(255,255,255,.1);
}

.loket-item b{
  font-size:2vw;
  color:#ffcc00;
}

/* RUNNING TEXT */
.running{
  height:5vh;
  background:#ffcc00;
  color:#000;
  display:flex;
  align-items:center;
  font-size:1.2vw;
  font-weight:700;
  overflow:hidden;
}

.marquee{
  white-space:nowrap;
  animation:jalan 20s linear infinite;
}

@keyframes jalan{
  0%{transform:translateX(100%)}
  100%{transform:translateX(-100%)}
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="wrapper">

<!-- HEADER -->
<div class="header">
  <div>MONITOR ANTRIAN RUTAN IIB PAINAN</div>
  <div class="time" id="jam">--:--:--</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="left">
    <div class="loket">No - Antrian</div>
    <div class="nomor-box" id="noAntrian">000</div>
  </div>

  <div class="right">
    <div class="video">
      <video autoplay muted loop>
        <source src="iduladha.mp4" type="video/mp4">
         <source src="Di antara banyaknya keistimewaan Ramadan, Kiki hanya menantikan satu hal.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  

</div>

<!-- PETUGAS -->
<div class="bottom">
  <div class="loket-item"><span>PETUGAS 1</span><b id="p1">-</b></div>
  <div class="loket-item"><span>PETUGAS 2</span><b id="p2">-</b></div>
  <div class="loket-item"><span>PETUGAS 3</span><b id="p3">-</b></div>
  <div class="loket-item"><span>PETUGAS 4</span><b id="p4">-</b></div>
  <div class="loket-item"><span>PETUGAS 5</span><b id="p5">-</b></div>
</div>

<!-- RUNNING TEXT -->
<div class="running">
  <div class="marquee">
    Selamat datang di layanan kunjungan Rutan Kelas IIB Painan • Harap mengikuti aturan • Terima kasih
  </div>
</div>

</div>

<script>
// ================= API =================
const API_ANTRIAN="https://script.google.com/macros/s/AKfycbyCoGTPVM2RRzxTve3ik1PQRS78VHYif1-33Lcg8XEKbRdaxOW02JxGGQxmItnNbeE2/exec";
const API_PETUGAS="https://script.google.com/macros/s/AKfycbzTUoCWMYBuD3QRLG1B_YryV1fdhupLNdtFGQrP4_MI6uhYDA91Th1QSKgvgnB1sfRQ/exec";

// ================= JAM =================
function updateJam(){
  document.getElementById("jam").innerText =
    new Date().toLocaleTimeString("id-ID");
}

// ================= ANTRIAN =================
function loadAntrian(){
  fetch(API_ANTRIAN)
  .then(res=>res.json())
  .then(data=>{
    const next = data.find(x=>x.status==="Menunggu");
    if(next){
      noAntrian.innerText = next.antrian;
    }else{
      noAntrian.innerText = "-";
    }
  });
}

// ================= PETUGAS FIX FINAL =================
function loadPetugas(){
  fetch(API_PETUGAS)
  .then(res=>res.json())
  .then(data=>{

    const now = new Date();

    const today =
      now.getFullYear() + "-" +
      String(now.getMonth()+1).padStart(2,'0') + "-" +
      String(now.getDate()).padStart(2,'0');

    console.log("Hari ini:", today);

    const jadwal = data.find(x => {
      const tglAPI = String(x.tanggal).slice(0,10); // 🔥 FIX UTAMA
      console.log("Banding:", tglAPI, "==", today);
      return tglAPI === today;
    });

    if(jadwal){
      console.log("✅ DATA KETEMU");

      document.getElementById("p1").innerText = jadwal.loket1 || "-";
      document.getElementById("p2").innerText = jadwal.loket2 || "-";
      document.getElementById("p3").innerText = jadwal.loket3 || "-";
      document.getElementById("p4").innerText = jadwal.loket4 || "-";
      document.getElementById("p5").innerText = jadwal.loket5 || "-";

    }else{
      console.log("❌ DATA TIDAK ADA");

      document.getElementById("p1").innerText = "-";
      document.getElementById("p2").innerText = "-";
      document.getElementById("p3").innerText = "-";
      document.getElementById("p4").innerText = "-";
      document.getElementById("p5").innerText = "-";
    }

  })
  .catch(err=>{
    console.log("ERROR:", err);
  });
}

// ================= FULLSCREEN =================
function openFullscreen(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}
document.body.onclick = openFullscreen;

// ================= INIT =================
setInterval(updateJam,1000);
setInterval(loadAntrian,3000);
setInterval(loadPetugas,5000);

updateJam();
loadAntrian();
loadPetugas();

</script>

</body>
</html>
